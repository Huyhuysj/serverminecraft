name: Minecraft Server

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  SERVER_DIR: ./server

jobs:
  server:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Read config
        id: config
        run: |
          source server-config.env
          echo "RAM=$RAM" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$JAR_FILENAME" >> $GITHUB_OUTPUT
          echo "DRIVE_FOLDER=$DRIVE_FOLDER" >> $GITHUB_OUTPUT
          echo "CUSTOM_OPTS=$CUSTOM_JAVA_OPTS" >> $GITHUB_OUTPUT
          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_OUTPUT

      - name: Install Java
        run: |
          sudo apt update
          JAVA_VER=${{ steps.config.outputs.JAVA_VERSION }}
          if [ "$JAVA_VER" = "8" ]; then
            sudo apt install -y openjdk-8-jdk
          elif [ "$JAVA_VER" = "11" ]; then
            sudo apt install -y openjdk-11-jdk
          elif [ "$JAVA_VER" = "17" ]; then
            sudo apt install -y openjdk-17-jdk
          elif [ "$JAVA_VER" = "21" ]; then
            sudo apt install -y openjdk-21-jdk
          else
            sudo apt install -y openjdk-21-jdk
          fi

      - name: Install rclone, screen, etc
        run: |
          sudo apt install -y screen curl unzip jq
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ vars.RCLONE_DRIVE_TOKEN_VAR }}
          EOF

      - name: Pull server data from Drive
        run: |
          REMOTE="driver:${{ steps.config.outputs.DRIVE_FOLDER }}"
          echo "📥 Pulling server data from $REMOTE"
          rclone sync "$REMOTE" ${{ env.SERVER_DIR }} -P --drive-acknowledge-abuse

      - name: Start Minecraft server in screen
        run: |
          cd ${{ env.SERVER_DIR }}
          # Kill any existing screen session
          screen -S mc -X quit 2>/dev/null || true
          screen -dmS mc
          CMD="java -Xmx${{ steps.config.outputs.RAM }} ${{ steps.config.outputs.CUSTOM_OPTS }} -jar ${{ steps.config.outputs.JAR_NAME }} nogui"
          echo "🚀 Starting server with command: $CMD"
          screen -S mc -X stuff "$CMD\n"
          sleep 5
          echo "✅ Server started in screen session 'mc'"
          # Save PID file for later kill
          echo $! > ../server.pid
          screen -ls

      - name: Show initial log
        run: |
          sleep 3
          echo "📋 Initial log (first 30 lines):"
          tail -30 ${{ env.SERVER_DIR }}/logs/latest.log || echo "Log file not yet created"

      - name: Periodic sync to Drive
        run: |
          echo "🔄 Periodic sync every 10 minutes started."
          while true; do
            echo "$(date) ⏳ Waiting 10 minutes..."
            sleep 600
            echo "$(date) 🔄 Syncing..."
            cd ${{ env.SERVER_DIR }}
            # Check if screen session exists
            if screen -list | grep -q "\.mc"; then
              screen -S mc -X stuff "save-all\n"
              echo "$(date) 💾 save-all sent to screen"
            else
              echo "$(date) ⚠️ Screen session 'mc' not found! Server may have crashed."
            fi
            cd ..
            REMOTE="driver:${{ steps.config.outputs.DRIVE_FOLDER }}"
            rclone sync ${{ env.SERVER_DIR }} "$REMOTE" -P --drive-acknowledge-abuse || echo "$(date) ⚠️ Sync failed"
            echo "$(date) ✅ Sync completed"
          done &
          wait

      - name: Final sync and cleanup
        if: always()
        run: |
          echo "🧹 Final sync before exit..."
          if [ -f server.pid ]; then
            kill $(cat server.pid) 2>/dev/null || true
            echo "🛑 Server stopped"
          fi
          screen -S mc -X quit 2>/dev/null || true
          REMOTE="driver:${{ steps.config.outputs.DRIVE_FOLDER }}"
          rclone sync ${{ env.SERVER_DIR }} "$REMOTE" -P --drive-acknowledge-abuse
          echo "✅ Final sync done"
