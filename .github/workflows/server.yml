name: Minecraft Server

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

env:
  SERVER_DIR: ./server

jobs:
  server:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Read config
        id: config
        run: |
          source server-config.env
          echo "RAM=$RAM" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$JAR_FILENAME" >> $GITHUB_OUTPUT
          echo "DRIVE_FOLDER=$DRIVE_FOLDER" >> $GITHUB_OUTPUT
          echo "CUSTOM_OPTS=$CUSTOM_JAVA_OPTS" >> $GITHUB_OUTPUT
          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_OUTPUT

      - name: Install Java
        run: |
          sudo apt update
          JAVA_VER=${{ steps.config.outputs.JAVA_VERSION }}
          if [ "$JAVA_VER" = "8" ]; then
            sudo apt install -y openjdk-8-jdk
          elif [ "$JAVA_VER" = "11" ]; then
            sudo apt install -y openjdk-11-jdk
          elif [ "$JAVA_VER" = "17" ]; then
            sudo apt install -y openjdk-17-jdk
          elif [ "$JAVA_VER" = "21" ]; then
            sudo apt install -y openjdk-21-jdk
          else
            sudo apt install -y openjdk-21-jdk
          fi

      - name: Install rclone, screen, etc
        run: |
          sudo apt install -y screen curl unzip jq
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb

      - name: Setup rclone
        env:
          RCLONE_TOKEN: ${{ secrets.RCLONE_DRIVE_TOKEN }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$RCLONE_TOKEN" > ~/.config/rclone/rclone.conf

      - name: Pull server data from Drive
        run: |
          rclone sync "driver:${{ steps.config.outputs.DRIVE_FOLDER }}" ${{ env.SERVER_DIR }} -P

      - name: Start Minecraft server
        run: |
          cd ${{ env.SERVER_DIR }}
          screen -dmS mc
          CMD="java -Xmx${{ steps.config.outputs.RAM }} ${{ steps.config.outputs.CUSTOM_OPTS }} -jar ${{ steps.config.outputs.JAR_NAME }} nogui"
          screen -S mc -X stuff "$CMD\n"
          echo $! > ../server.pid

      - name: Periodic sync to Drive
        run: |
          while true; do
            sleep 600
            cd ${{ env.SERVER_DIR }}
            screen -S mc -X stuff "save-all\n"
            cd ..
            rclone sync ${{ env.SERVER_DIR }} "driver:${{ steps.config.outputs.DRIVE_FOLDER }}" -P
          done &
          wait

      - name: Final sync and cleanup
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) 2>/dev/null || true; fi
          rclone sync ${{ env.SERVER_DIR }} "driver:${{ steps.config.outputs.DRIVE_FOLDER }}" -P
