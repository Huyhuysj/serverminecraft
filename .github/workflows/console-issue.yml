name: Console via Issue

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  process:
    if: github.repository == 'Huyhuysj/serverminecraft' && contains(github.event.issue.labels.*.name, 'console')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Read config
        id: config
        run: |
          source server-config.env
          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_OUTPUT
          echo "DRIVE_FOLDER=$DRIVE_FOLDER" >> $GITHUB_OUTPUT

      - name: Install Java
        run: |
          sudo apt update
          JAVA_VER=${{ steps.config.outputs.JAVA_VERSION }}
          if [ "$JAVA_VER" = "8" ]; then
            sudo apt install -y openjdk-8-jdk
          elif [ "$JAVA_VER" = "11" ]; then
            sudo apt install -y openjdk-11-jdk
          elif [ "$JAVA_VER" = "17" ]; then
            sudo apt install -y openjdk-17-jdk
          elif [ "$JAVA_VER" = "21" ]; then
            sudo apt install -y openjdk-21-jdk
          else
            sudo apt install -y openjdk-21-jdk
          fi

      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ vars.RCLONE_DRIVE_TOKEN_VAR }}" > ~/.config/rclone/rclone.conf

      - name: Pull server data from Drive
        run: |
          source server-config.env
          rclone sync "driver:$DRIVE_FOLDER" ./server -P

      - name: Send command to server
        id: send
        run: |
          COMMAND="${{ github.event.issue.title }}"
          echo "$COMMAND" > ./server/command.txt
          cd server
          screen -dmS mc
          screen -S mc -X stuff "java -Xmx15G -jar server.jar nogui\n"
          sleep 5
          screen -S mc -X stuff "$COMMAND\n"
          sleep 2
          tail -20 logs/latest.log > ../log.txt || echo "No log yet" > ../log.txt

      - name: Comment result back to issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh issue comment ${{ github.event.issue.number }} -F log.txt
