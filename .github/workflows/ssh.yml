name: SSH Tunnel (Cloudflare Quick Tunnel)

on:
  workflow_dispatch:
    inputs:
      ssh_password:
        description: 'Mật khẩu SSH'
        required: true
        default: 'mySecurePassword123'

jobs:
  tunnel:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Install cloudflared
        run: |
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start SSH Server và Cloudflare Tunnel
        run: |
          # 1. Cài SSH server
          sudo apt update && sudo apt install -y openssh-server

          # 2. Đặt mật khẩu cho user runner
          echo "runner:${{ github.event.inputs.ssh_password }}" | sudo chpasswd
          sudo usermod -s /bin/bash runner
          sudo mkdir -p /home/runner
          sudo chown runner:runner /home/runner

          # 3. Cho phép đăng nhập bằng mật khẩu
          sudo sed -i 's/^#PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl restart ssh

          # 4. Tạo Cloudflare Tunnel với cổng SSH
          echo "🔄 Đang tạo Cloudflare Tunnel..."
          cloudflared tunnel --url localhost:22 &

          # 5. Đợi tunnel khởi tạo
          sleep 10

          # 6. Lấy URL tunnel
          TUNNEL_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/https:\/\///')
          echo "✅ SSH Tunnel đã sẵn sàng!"
          echo "🔗 Địa chỉ: $TUNNEL_URL"
          echo "🔑 Username: runner"
          echo "🔑 Password: ${{ github.event.inputs.ssh_password }}"
          echo ""
          echo "📌 Trên Termius:"
          echo "   Hostname: $TUNNEL_URL"
          echo "   Port: 22"
          echo "   Username: runner"
          echo "   Password: ..."

          # 7. Giữ workflow chạy
          wait
