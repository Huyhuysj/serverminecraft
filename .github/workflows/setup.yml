name: Setup Server (First time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Read config
        id: config
        run: |
          source server-config.env
          echo "JAR_URL=$SERVER_JAR_URL" >> $GITHUB_OUTPUT
          echo "JAR_NAME=$JAR_FILENAME" >> $GITHUB_OUTPUT
          echo "DRIVE_FOLDER=$DRIVE_FOLDER" >> $GITHUB_OUTPUT
          echo "JAVA_VERSION=$JAVA_VERSION" >> $GITHUB_OUTPUT

      - name: Install Java
        run: |
          sudo apt update
          JAVA_VER=${{ steps.config.outputs.JAVA_VERSION }}
          if [ "$JAVA_VER" = "8" ]; then
            sudo apt install -y openjdk-8-jdk
          elif [ "$JAVA_VER" = "11" ]; then
            sudo apt install -y openjdk-11-jdk
          elif [ "$JAVA_VER" = "17" ]; then
            sudo apt install -y openjdk-17-jdk
          elif [ "$JAVA_VER" = "21" ]; then
            sudo apt install -y openjdk-21-jdk
          else
            sudo apt install -y openjdk-21-jdk
          fi

      - name: Install rclone
        run: |
          curl -O https://downloads.rclone.org/rclone-current-linux-amd64.deb
          sudo dpkg -i rclone-current-linux-amd64.deb

      - name: Setup rclone using variable (heredoc)
        run: |
          mkdir -p ~/.config/rclone
          cat << 'EOF' > ~/.config/rclone/rclone.conf
          ${{ vars.RCLONE_DRIVE_TOKEN_VAR }}
          EOF
          head -n 5 ~/.config/rclone/rclone.conf

      - name: Create server directory and download jar
        run: |
          mkdir -p server
          cd server
          curl -L -o ${{ steps.config.outputs.JAR_NAME }} ${{ steps.config.outputs.JAR_URL }}
          echo "eula=true" > eula.txt
          echo "server-port=25565" > server.properties
          mkdir -p mods plugins world

      - name: Sync to Google Drive
        run: |
          rclone sync server "driver:${{ steps.config.outputs.DRIVE_FOLDER }}" -P
